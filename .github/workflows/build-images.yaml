name: Build and Push Container Images

on:
  push:
    branches:
      - main
    tags:
      - "*"
    paths:
      - ".github/workflows/build-images.yaml"
      - "build/**"
      - "profiles/**"
      - "src/**"
      - "pyproject.toml"
  issue_comment:
    types:
      - created
  pull_request_target:
    types:
      - closed
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag:
        description: "Optional persistent image tag to keep outside automatic cleanup"
        required: false
        type: string
      base_image_repository:
        description: "Optional base image repository override for manual builds"
        required: false
        type: string
      base_image_tag:
        description: "Optional base image tag override for manual builds"
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_REPOSITORY: ${{ github.repository_owner }}/benchflow

jobs:
  resolve-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read
      pull-requests: read
    outputs:
      should_build: ${{ steps.resolve.outputs.should_build }}
      checkout_ref: ${{ steps.resolve.outputs.checkout_ref }}
      checkout_repository: ${{ steps.resolve.outputs.checkout_repository }}
      build_channel: ${{ steps.resolve.outputs.build_channel }}
      tag_prefix: ${{ steps.resolve.outputs.tag_prefix }}
      cleanup_pattern: ${{ steps.resolve.outputs.cleanup_pattern }}
      cleanup_keep: ${{ steps.resolve.outputs.cleanup_keep }}
      persistent_tag: ${{ steps.resolve.outputs.persistent_tag }}
      base_image_repository: ${{ steps.resolve.outputs.base_image_repository }}
      base_image_tag: ${{ steps.resolve.outputs.base_image_tag }}
    steps:
      - name: Checkout repository metadata
        if: github.event_name == 'push'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve build context
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          SHOULD_BUILD=false
          CHECKOUT_REPOSITORY="${GITHUB_REPOSITORY}"
          CHECKOUT_REF="${GITHUB_SHA}"
          BUILD_CHANNEL=""
          TAG_PREFIX=""
          CLEANUP_PATTERN=""
          CLEANUP_KEEP=0
          PERSISTENT_TAG=""
          BASE_IMAGE_REPOSITORY=""
          BASE_IMAGE_TAG=""

          if [[ "${GITHUB_EVENT_NAME}" == "issue_comment" ]]; then
            BODY="$(jq -r '.comment.body // ""' "${GITHUB_EVENT_PATH}")"
            ASSOCIATION="$(jq -r '.comment.author_association // ""' "${GITHUB_EVENT_PATH}")"
            IS_PR="$(jq -r 'has("issue") and (.issue | has("pull_request"))' "${GITHUB_EVENT_PATH}")"
            PR_NUMBER="$(jq -r '.issue.number // ""' "${GITHUB_EVENT_PATH}")"

            if [[ "${IS_PR}" == "true" ]] \
              && [[ "${BODY}" =~ ^/build([[:space:]]|$) ]] \
              && [[ "${ASSOCIATION}" =~ ^(OWNER|MEMBER|COLLABORATOR)$ ]]; then
              PR_JSON="$(gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}")"
              PR_STATE="$(jq -r '.state' <<< "${PR_JSON}")"

              if [[ "${PR_STATE}" == "open" ]]; then
                SHOULD_BUILD=true
                CHECKOUT_REPOSITORY="$(jq -r '.head.repo.full_name' <<< "${PR_JSON}")"
                CHECKOUT_REF="$(jq -r '.head.sha' <<< "${PR_JSON}")"
                BUILD_CHANNEL="pr"
                TAG_PREFIX="pr-${PR_NUMBER}"
                CLEANUP_PATTERN="^pr-${PR_NUMBER}-[0-9a-f]{7}$"
                CLEANUP_KEEP=3
              fi
            fi
          elif [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            SHOULD_BUILD=true
            CHECKOUT_REF="${GITHUB_SHA}"
            BUILD_CHANNEL="manual"
            PERSISTENT_TAG="$(jq -r '.inputs.tag // ""' "${GITHUB_EVENT_PATH}")"
            BASE_IMAGE_REPOSITORY="$(jq -r '.inputs.base_image_repository // ""' "${GITHUB_EVENT_PATH}")"
            BASE_IMAGE_TAG="$(jq -r '.inputs.base_image_tag // ""' "${GITHUB_EVENT_PATH}")"
            if [[ -n "${PERSISTENT_TAG}" ]]; then
              if [[ ! "${PERSISTENT_TAG}" =~ ^[A-Za-z0-9_][A-Za-z0-9._-]{0,127}$ ]]; then
                echo "Invalid manual tag: ${PERSISTENT_TAG}" >&2
                exit 1
              fi
              if [[ "${PERSISTENT_TAG}" =~ ^main-[0-9a-f]{7}$ ]] \
                || [[ "${PERSISTENT_TAG}" =~ ^manual-[0-9a-f]{7}$ ]] \
                || [[ "${PERSISTENT_TAG}" =~ ^pr-[0-9]+-[0-9a-f]{7}$ ]]; then
                echo "Manual tag ${PERSISTENT_TAG} uses a reserved automatic tag pattern" >&2
                exit 1
              fi
            else
              CLEANUP_PATTERN="^manual-[0-9a-f]{7}$"
              CLEANUP_KEEP=3
            fi
          elif [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            SHOULD_BUILD=true
            CHECKOUT_REF="${GITHUB_SHA}"
            BUILD_CHANNEL="main"
            CLEANUP_PATTERN="^main-[0-9a-f]{7}$"
            CLEANUP_KEEP=3
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            git fetch origin main --depth=1
            if git merge-base --is-ancestor "${GITHUB_SHA}" origin/main; then
              SHOULD_BUILD=true
              CHECKOUT_REF="${GITHUB_SHA}"
              BUILD_CHANNEL="release"
              TAG_PREFIX="${GITHUB_REF_NAME}"
            fi
          fi

          {
            echo "should_build=${SHOULD_BUILD}"
            echo "checkout_ref=${CHECKOUT_REF}"
            echo "checkout_repository=${CHECKOUT_REPOSITORY}"
            echo "build_channel=${BUILD_CHANNEL}"
            echo "tag_prefix=${TAG_PREFIX}"
            echo "cleanup_pattern=${CLEANUP_PATTERN}"
            echo "cleanup_keep=${CLEANUP_KEEP}"
            echo "persistent_tag=${PERSISTENT_TAG}"
            echo "base_image_repository=${BASE_IMAGE_REPOSITORY}"
            echo "base_image_tag=${BASE_IMAGE_TAG}"
          } >> "${GITHUB_OUTPUT}"

  build-images:
    needs: resolve-build
    if: needs.resolve-build.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          repository: ${{ needs.resolve-build.outputs.checkout_repository }}
          ref: ${{ needs.resolve-build.outputs.checkout_ref }}
          fetch-depth: 1

      - name: Install podman
        run: |
          sudo apt-get update
          sudo apt-get -y install podman

      - name: Set image tags
        id: tags
        env:
          BUILD_CHANNEL: ${{ needs.resolve-build.outputs.build_channel }}
          TAG_PREFIX: ${{ needs.resolve-build.outputs.tag_prefix }}
          PERSISTENT_TAG: ${{ needs.resolve-build.outputs.persistent_tag }}
        run: |
          set -euo pipefail

          SHORT_SHA="$(git rev-parse --short=7 HEAD)"
          TAGS=()

          case "${BUILD_CHANNEL}" in
            main)
              TAGS+=("latest")
              TAGS+=("main-${SHORT_SHA}")
              ;;
            pr)
              TAGS+=("${TAG_PREFIX}-${SHORT_SHA}")
              ;;
            manual)
              if [[ -n "${PERSISTENT_TAG}" ]]; then
                TAGS+=("${PERSISTENT_TAG}")
              else
                TAGS+=("manual-${SHORT_SHA}")
              fi
              ;;
            release)
              TAGS+=("${TAG_PREFIX}")
              ;;
            *)
              echo "Unsupported build channel: ${BUILD_CHANNEL}" >&2
              exit 1
              ;;
          esac

          {
            echo "primary_tag=${TAGS[0]}"
            echo "tags<<EOF"
            printf '%s\n' "${TAGS[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | podman login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Build BenchFlow image
        env:
          BASE_IMAGE_REPOSITORY: ${{ needs.resolve-build.outputs.base_image_repository }}
          BASE_IMAGE_TAG: ${{ needs.resolve-build.outputs.base_image_tag }}
        run: |
          set -euo pipefail

          LOCAL_IMAGE="local/benchflow:${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          RESOLVED_BASE_IMAGE_REPOSITORY="${BASE_IMAGE_REPOSITORY:-ghcr.io/albertoperdomo2/guidellm}"
          RESOLVED_BASE_IMAGE_TAG="${BASE_IMAGE_TAG:-nightly}"
          RESOLVED_BASE_IMAGE="${RESOLVED_BASE_IMAGE_REPOSITORY}:${RESOLVED_BASE_IMAGE_TAG}"
          RESOLVED_GUIDELLM_VERSION_LABEL="albertoperdomo2-nightly"
          if [[ -n "${BASE_IMAGE_REPOSITORY}" || -n "${BASE_IMAGE_TAG}" ]]; then
            RESOLVED_GUIDELLM_VERSION_LABEL="${RESOLVED_BASE_IMAGE}"
          fi

          podman build \
            -f build/Containerfile \
            --build-arg GUIDELLM_IMAGE_REPOSITORY="${RESOLVED_BASE_IMAGE_REPOSITORY}" \
            --build-arg GUIDELLM_IMAGE_TAG="${RESOLVED_BASE_IMAGE_TAG}" \
            --build-arg GUIDELLM_VERSION_LABEL="${RESOLVED_GUIDELLM_VERSION_LABEL}" \
            -t "${LOCAL_IMAGE}" \
            .

          echo "LOCAL_IMAGE=${LOCAL_IMAGE}" >> "${GITHUB_ENV}"
          echo "RESOLVED_BASE_IMAGE=${RESOLVED_BASE_IMAGE}" >> "${GITHUB_ENV}"

      - name: Push BenchFlow images
        run: |
          set -euo pipefail

          while IFS= read -r tag; do
            [[ -z "${tag}" ]] && continue
            IMAGE_URL="${{ env.REGISTRY }}/${{ env.IMAGE_REPOSITORY }}:${tag}"
            podman tag "${LOCAL_IMAGE}" "${IMAGE_URL}"
            podman push "${IMAGE_URL}"
          done <<< "${{ steps.tags.outputs.tags }}"

      - name: Image summary
        run: |
          echo "## Built Images" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Base image: \`${RESOLVED_BASE_IMAGE}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          while IFS= read -r tag; do
            [[ -z "${tag}" ]] && continue
            echo "- \`${{ env.REGISTRY }}/${{ env.IMAGE_REPOSITORY }}:${tag}\`" >> "$GITHUB_STEP_SUMMARY"
          done <<< "${{ steps.tags.outputs.tags }}"

  cleanup-automatic-images:
    needs:
      - resolve-build
      - build-images
    if: needs.resolve-build.outputs.cleanup_pattern != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Prune old automatic image versions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLEANUP_PATTERN: ${{ needs.resolve-build.outputs.cleanup_pattern }}
          CLEANUP_KEEP: ${{ needs.resolve-build.outputs.cleanup_keep }}
        run: |
          set -euo pipefail

          OWNER_TYPE="$(gh api "/users/${GITHUB_REPOSITORY_OWNER}" --jq '.type')"
          if [[ "${OWNER_TYPE}" == "Organization" ]]; then
            API_SCOPE="orgs"
          else
            API_SCOPE="users"
          fi

          PACKAGE_NAME="benchflow"
          PACKAGE_NAME_ENCODED="${PACKAGE_NAME//\//%2F}"
          PACKAGE_BASE="/${API_SCOPE}/${GITHUB_REPOSITORY_OWNER}/packages/container/${PACKAGE_NAME_ENCODED}/versions"

          if ! gh api "${PACKAGE_BASE}?per_page=1" >/dev/null 2>&1; then
            echo "Could not resolve the GHCR package name for benchflow" >&2
            exit 1
          fi

          echo "Pruning package ${PACKAGE_NAME}"
          gh api --paginate "${PACKAGE_BASE}?per_page=100" | jq -s 'add' > versions.json

          mapfile -t DELETE_IDS < <(
            jq -r --arg regex "${CLEANUP_PATTERN}" --argjson keep "${CLEANUP_KEEP}" '
              map(select(any(.metadata.container.tags[]?; test($regex))))
              | sort_by(.created_at)
              | reverse
              | .[$keep:]
              | .[].id
            ' versions.json
          )

          if [[ "${#DELETE_IDS[@]}" -eq 0 ]]; then
            echo "No old automatic BenchFlow image versions to prune"
            exit 0
          fi

          for version_id in "${DELETE_IDS[@]}"; do
            echo "Deleting package version ${version_id} from benchflow"
            gh api --method DELETE "${PACKAGE_BASE}/${version_id}"
          done

  cleanup-pr-images:
    if: github.event_name == 'pull_request_target' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      pull-requests: read
    steps:
      - name: Prune closed PR image versions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          OWNER_TYPE="$(gh api "/users/${GITHUB_REPOSITORY_OWNER}" --jq '.type')"
          if [[ "${OWNER_TYPE}" == "Organization" ]]; then
            API_SCOPE="orgs"
          else
            API_SCOPE="users"
          fi

          PACKAGE_NAME="benchflow"
          PACKAGE_NAME_ENCODED="${PACKAGE_NAME//\//%2F}"
          PACKAGE_BASE="/${API_SCOPE}/${GITHUB_REPOSITORY_OWNER}/packages/container/${PACKAGE_NAME_ENCODED}/versions"

          if ! gh api "${PACKAGE_BASE}?per_page=1" >/dev/null 2>&1; then
            echo "Could not resolve the GHCR package name for benchflow" >&2
            exit 1
          fi

          echo "Pruning PR ${PR_NUMBER} images from package ${PACKAGE_NAME}"
          gh api --paginate "${PACKAGE_BASE}?per_page=100" | jq -s 'add' > versions.json

          mapfile -t DELETE_IDS < <(
            jq -r --arg regex "^pr-${PR_NUMBER}-[0-9a-f]{7}$" '
              map(select(any(.metadata.container.tags[]?; test($regex))))
              | .[].id
            ' versions.json
          )

          if [[ "${#DELETE_IDS[@]}" -eq 0 ]]; then
            echo "No PR image versions to prune for PR ${PR_NUMBER}"
            exit 0
          fi

          for version_id in "${DELETE_IDS[@]}"; do
            echo "Deleting package version ${version_id} from benchflow"
            gh api --method DELETE "${PACKAGE_BASE}/${version_id}"
          done
