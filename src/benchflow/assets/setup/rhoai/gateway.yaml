apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  labels:
    istio.io/rev: openshift-gateway
  name: openshift-ai-inference
  namespace: openshift-ingress
spec:
  gatewayClassName: openshift-ai-inference
  listeners:
    - name: https
      port: 443
      protocol: HTTPS
      hostname: "{{ HOSTNAME }}"
      tls:
        certificateRefs:
          - group: ""
            kind: Secret
            name: "{{ TLS_SECRET_NAME }}"
        mode: Terminate
      allowedRoutes:
        namespaces:
          from: All
