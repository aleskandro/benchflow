apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: "benchflow-runner-llmd-cluster-rbac-{{ BENCHFLOW_NAMESPACE }}"
  labels:
    app.kubernetes.io/name: benchflow
    benchflow.io/purpose: runner-rbac
rules:
  - apiGroups: [""]
    resources: ["namespaces"]
    resourceNames:
      [
        "{{ BENCHFLOW_NAMESPACE }}",
        "istio-system",
        "redhat-ods-operator",
        "redhat-ods-applications",
        "openshift-ingress",
      ]
    verbs: ["get", "patch", "update"]
  - apiGroups: [""]
    resources: ["namespaces"]
    resourceNames: ["redhat-ods-operator"]
    verbs: ["delete"]
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["list", "watch"]
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["*"]
  - apiGroups: ["admissionregistration.k8s.io"]
    resources:
      ["mutatingwebhookconfigurations", "validatingwebhookconfigurations"]
    verbs: ["*"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["clusterroles", "clusterrolebindings"]
    verbs: ["*"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["rolebindings"]
    verbs: ["*"]
  - apiGroups: ["operators.coreos.com"]
    resources:
      ["subscriptions", "operatorgroups", "clusterserviceversions", "installplans"]
    verbs: ["*"]
  - apiGroups: ["packages.operators.coreos.com"]
    resources: ["packagemanifests"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["datasciencecluster.opendatahub.io"]
    resources: ["datascienceclusters"]
    verbs: ["*"]
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["gatewayclasses", "gateways"]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: "benchflow-runner-llmd-cluster-rbac-{{ BENCHFLOW_NAMESPACE }}"
  labels:
    app.kubernetes.io/name: benchflow
    benchflow.io/purpose: runner-rbac
subjects:
  - kind: ServiceAccount
    name: benchflow-runner
    namespace: "{{ BENCHFLOW_NAMESPACE }}"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: "benchflow-runner-llmd-cluster-rbac-{{ BENCHFLOW_NAMESPACE }}"
