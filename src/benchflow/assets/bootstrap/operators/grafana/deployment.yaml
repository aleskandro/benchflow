apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: "{{ GRAFANA_NAMESPACE }}"
  labels:
    app.kubernetes.io/name: benchflow
    benchflow.io/component: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: benchflow
      benchflow.io/component: grafana
  template:
    metadata:
      labels:
        app.kubernetes.io/name: benchflow
        benchflow.io/component: grafana
    spec:
      serviceAccountName: "{{ GRAFANA_SERVICE_ACCOUNT }}"
      containers:
        - name: grafana
          image: grafana/grafana:11.5.2
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: "{{ GRAFANA_ADMIN_SECRET_NAME }}"
                  key: admin-user
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: "{{ GRAFANA_ADMIN_SECRET_NAME }}"
                  key: admin-password
            - name: GRAFANA_THANOS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: "{{ GRAFANA_DATASOURCE_TOKEN_SECRET }}"
                  key: token
          volumeMounts:
            - name: grafana-data
              mountPath: /var/lib/grafana
            - name: provisioning
              mountPath: /etc/grafana/provisioning/datasources/datasources.yaml
              subPath: datasources.yaml
            - name: provisioning
              mountPath: /etc/grafana/provisioning/dashboards/dashboards.yaml
              subPath: dashboards.yaml
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: grafana-data
          emptyDir: {}
        - name: provisioning
          configMap:
            name: grafana-provisioning
        - name: dashboards
          configMap:
            name: grafana-dashboards
