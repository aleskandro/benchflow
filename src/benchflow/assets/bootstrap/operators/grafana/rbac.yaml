apiVersion: v1
kind: ServiceAccount
metadata:
  name: "{{ GRAFANA_SERVICE_ACCOUNT }}"
  namespace: "{{ GRAFANA_NAMESPACE }}"
  labels:
    app.kubernetes.io/name: benchflow
    benchflow.io/component: grafana
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: benchflow-grafana-route-reader
  namespace: "{{ GRAFANA_NAMESPACE }}"
  labels:
    app.kubernetes.io/name: benchflow
    benchflow.io/component: grafana
rules:
  - apiGroups: ["route.openshift.io"]
    resources: ["routes"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: benchflow-grafana-route-reader
  namespace: "{{ GRAFANA_NAMESPACE }}"
  labels:
    app.kubernetes.io/name: benchflow
    benchflow.io/component: grafana
subjects:
  - kind: ServiceAccount
    name: benchflow-runner
    namespace: "{{ BENCHFLOW_NAMESPACE }}"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: benchflow-grafana-route-reader
---
apiVersion: v1
kind: Secret
metadata:
  name: "{{ GRAFANA_DATASOURCE_TOKEN_SECRET }}"
  namespace: "{{ GRAFANA_NAMESPACE }}"
  annotations:
    kubernetes.io/service-account.name: "{{ GRAFANA_SERVICE_ACCOUNT }}"
  labels:
    app.kubernetes.io/name: benchflow
    benchflow.io/component: grafana
type: kubernetes.io/service-account-token
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: "benchflow-grafana-cluster-monitoring-view-{{ BENCHFLOW_NAMESPACE }}"
  labels:
    app.kubernetes.io/name: benchflow
    benchflow.io/component: grafana
subjects:
  - kind: ServiceAccount
    name: "{{ GRAFANA_SERVICE_ACCOUNT }}"
    namespace: "{{ GRAFANA_NAMESPACE }}"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-monitoring-view
