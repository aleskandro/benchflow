apiVersion: v1
kind: Secret
metadata:
  name: "{{ GRAFANA_ADMIN_SECRET_NAME }}"
  namespace: "{{ GRAFANA_NAMESPACE }}"
  labels:
    app.kubernetes.io/name: benchflow
    benchflow.io/component: grafana
type: Opaque
stringData:
  admin-user: "{{ GRAFANA_ADMIN_USER }}"
  admin-password: "{{ GRAFANA_ADMIN_PASSWORD }}"
