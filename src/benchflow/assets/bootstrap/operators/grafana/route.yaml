apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: grafana
  namespace: "{{ GRAFANA_NAMESPACE }}"
  labels:
    app.kubernetes.io/name: benchflow
    benchflow.io/component: grafana
spec:
  to:
    kind: Service
    name: grafana
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
