apiVersion: v1
kind: ServiceAccount
metadata:
  name: benchflow-remote-capacity-controller
  namespace: "{{ BENCHFLOW_NAMESPACE }}"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: benchflow-remote-capacity-controller
rules:
  - apiGroups: ["kueue.x-k8s.io"]
    resources: ["admissionchecks"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["kueue.x-k8s.io"]
    resources: ["admissionchecks/status"]
    verbs: ["get", "patch", "update"]
  - apiGroups: ["kueue.x-k8s.io"]
    resources: ["workloads"]
    verbs: ["get", "list", "watch", "delete"]
  - apiGroups: ["kueue.x-k8s.io"]
    resources: ["workloads/status"]
    verbs: ["get", "patch", "update"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "delete"]
  - apiGroups: ["tekton.dev"]
    resources: ["pipelineruns"]
    verbs: ["get", "list", "watch", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: benchflow-remote-capacity-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: benchflow-remote-capacity-controller
subjects:
  - kind: ServiceAccount
    name: benchflow-remote-capacity-controller
    namespace: "{{ BENCHFLOW_NAMESPACE }}"
---
apiVersion: kueue.x-k8s.io/v1beta2
kind: AdmissionCheck
metadata:
  name: benchflow-remote-capacity
  labels:
    app.kubernetes.io/name: benchflow
spec:
  controllerName: benchflow.io/remote-capacity
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: benchflow-remote-capacity-controller
  namespace: "{{ BENCHFLOW_NAMESPACE }}"
  labels:
    app.kubernetes.io/name: benchflow
    app.kubernetes.io/component: remote-capacity-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: benchflow
      app.kubernetes.io/component: remote-capacity-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: benchflow
        app.kubernetes.io/component: remote-capacity-controller
    spec:
      serviceAccountName: benchflow-remote-capacity-controller
      containers:
        - name: controller
          image: "{{ BENCHFLOW_IMAGE }}"
          imagePullPolicy: Always
          command: ["bflow"]
          args:
            - "task"
            - "remote-capacity-controller"
            - "--namespace"
            - "{{ BENCHFLOW_NAMESPACE }}"
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
