apiVersion: benchflow.io/v1alpha1
kind: Experiment
metadata:
  name: gpt-oss-120b-rhoai-release
spec:
  model:
    name:
      - openai/gpt-oss-120b
  deployment_profile:
    # - rhoai-raw-kserve  # XXX: one time baseline, hardcoded to rhaiis-3.3.0 
    - rhoai-distributed-default
    - rhoai-approximate-prefix-cache
    - rhoai-precise-prefix-cache
  benchmark_profile:
    - guidellm-concurrent-1k-1k
    - guidellm-concurrent-heavy-heterogeneous-v2
    - guidellm-concurrent-heavy-heterogeneous
    - guidellm-multi-turn
  overrides:
    benchmark:
      request_type: text_completions
  metrics_profile: detailed
  mlflow:
    tags:
      accelerator: H200
  namespace: benchflow
  execution:
    timeout: 8h
