apiVersion: benchflow.io/v1alpha1
kind: Experiment
metadata:
  name: rhoai-release
spec:
  model:
    name:
      - RedHatAI/Llama-3.3-70B-Instruct-FP8-dynamic
      # - openai/gpt-oss-120b
  deployment_profile:
    - rhoai-kserve
    - rhoai-approximate-prefix-cache
    - rhoai-precise-prefix-cache
  benchmark_profile:
    # - guidellm-concurrent-1k-1k
    # - guidellm-concurrent-heavy-heterogeneous
    - guidellm-multi-turn
  metrics_profile: detailed
  namespace: benchflow
  execution:
    timeout: 8h
  overrides:
    images:
      scheduler: quay.io/rh-ee-aperdomo/llm-d-inference-scheduler:v0.4.0
