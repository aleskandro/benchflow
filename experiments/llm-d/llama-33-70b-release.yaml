apiVersion: benchflow.io/v1alpha1
kind: Experiment
metadata:
  name: llama-33-70b-llm-drelease
spec:
  model:
    name:
      - RedHatAI/Llama-3.3-70B-Instruct-FP8-dynamic
  deployment_profile:
    - llm-d-inference-scheduling
    - llm-d-precise-prefix-cache
  benchmark_profile:
    - guidellm-concurrent-1k-1k
    - guidellm-concurrent-heavy-heterogeneous
    - guidellm-multi-turn
  metrics_profile: detailed
  namespace: benchflow
  execution:
    timeout: 8h