apiVersion: benchflow.io/v1alpha1
kind: Experiment
metadata:
  name: gpt-oss-120b-llm-d-release
spec:
  model:
    name:
      - openai/gpt-oss-120b
  deployment_profile:
    - llm-d-inference-scheduling
    - llm-d-precise-prefix-cache
  benchmark_profile:
    - guidellm-concurrent-1k-1k
    - guidellm-concurrent-heavy-heterogeneous
    - guidellm-multi-turn
  metrics_profile: detailed
  mlflow:
    tags:
      accelerator: H200
  namespace: benchflow
  execution:
    timeout: 8h
  overrides:
    benchmark:
      request_type: text_completions