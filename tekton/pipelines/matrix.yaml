apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: benchflow-matrix
  labels:
    app.kubernetes.io/name: benchflow
spec:
  description: >-
    BenchFlow matrix supervisor pipeline. It consumes a pre-resolved array of
    child RunPlans and runs each child PipelineRun sequentially in the cluster.
  workspaces:
    - name: target-kubeconfig
      description: Optional kubeconfig for remote target-cluster operations
  params:
    - name: RUN_PLANS_CONFIGMAP
      type: string
      description: ConfigMap name containing the JSON array of resolved immutable RunPlans.
    - name: BENCHFLOW_IMAGE
      type: string
      default: ghcr.io/albertoperdomo2/benchflow:latest
    - name: CHILD_PIPELINE_NAME
      type: string
      default: benchflow-e2e
  tasks:
    - name: run-experiment-matrix
      timeout: "48h"
      taskRef:
        name: run-experiment-matrix
      params:
        - name: IMAGE
          value: $(params.BENCHFLOW_IMAGE)
        - name: RUN_PLANS_CONFIGMAP
          value: $(params.RUN_PLANS_CONFIGMAP)
        - name: CHILD_PIPELINE_NAME
          value: $(params.CHILD_PIPELINE_NAME)
      workspaces:
        - name: target-kubeconfig
          workspace: target-kubeconfig
