apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: deploy-llm-d-inference-scheduling
  labels:
    app.kubernetes.io/version: "0.9"
  annotations:
    tekton.dev/displayName: "Deploy llm-d Model with Inference Scheduling"
spec:
  description: >-
    Deploy a model using the upstream llm-d inference-scheduling guide through
    the BenchFlow control image.
  params:
    - name: IMAGE
      type: string
      default: ghcr.io/albertoperdomo2/benchflow/benchflow:latest
    - name: RUN_PLAN
      type: string
    - name: PIPELINE_RUN_NAME
      type: string
      default: ""
  workspaces:
    - name: source
      description: Workspace used to clone and prepare the llm-d repository
    - name: manifests-storage
      description: Workspace for storing rendered manifests
      optional: true
  steps:
    - name: deploy
      image: $(params.IMAGE)
      command:
        - bflow
      args:
        - deploy
        - llm-d
        - --run-plan-json
        - $(params.RUN_PLAN)
        - --workspace-dir
        - $(workspaces.source.path)
        - --manifests-dir
        - $(workspaces.manifests-storage.path)
        - --pipeline-run-name
        - $(params.PIPELINE_RUN_NAME)
