apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: collect-artifacts
  labels:
    app.kubernetes.io/version: "0.7"
  annotations:
    tekton.dev/displayName: "Collect Artifacts"
spec:
  description: >-
    Collect pipeline logs, workload logs, and manifests into the artifacts workspace
    using the BenchFlow control image.
  params:
    - name: IMAGE
      type: string
      default: ghcr.io/albertoperdomo2/benchflow/benchflow:latest
    - name: RUN_PLAN
      type: string
    - name: PIPELINE_RUN_NAME
      type: string
      default: ""
    - name: MLFLOW_RUN_ID
      type: string
      default: ""
  workspaces:
    - name: artifacts
      description: Workspace to save collected artifacts
    - name: target-kubeconfig
      description: Optional kubeconfig for remote target-cluster operations
      optional: true
  steps:
    - name: collect
      image: $(params.IMAGE)
      env:
        - name: BENCHFLOW_REMOTE_IMAGE
          value: $(params.IMAGE)
        - name: BENCHFLOW_TARGET_KUBECONFIG_WORKSPACE
          value: $(workspaces.target-kubeconfig.path)
        - name: MLFLOW_TRACKING_URI
          valueFrom:
            secretKeyRef:
              name: mlflow-ui-auth
              key: tracking-uri
              optional: true
        - name: MLFLOW_TRACKING_USERNAME
          valueFrom:
            secretKeyRef:
              name: mlflow-ui-auth
              key: username
              optional: true
        - name: MLFLOW_TRACKING_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mlflow-ui-auth
              key: password
              optional: true
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: mlflow-s3-secret
              key: access-key
              optional: true
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: mlflow-s3-secret
              key: secret-key
              optional: true
        - name: AWS_DEFAULT_REGION
          valueFrom:
            secretKeyRef:
              name: mlflow-s3-secret
              key: region
              optional: true
        - name: MLFLOW_TRACKING_INSECURE_TLS
          value: "true"
      command:
        - bflow
      args:
        - artifacts
        - collect
        - --run-plan-json
        - $(params.RUN_PLAN)
        - --artifacts-dir
        - $(workspaces.artifacts.path)
        - --execution-name
        - $(params.PIPELINE_RUN_NAME)
        - --mlflow-run-id
        - $(params.MLFLOW_RUN_ID)
