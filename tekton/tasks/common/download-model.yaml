apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: download-model
  labels:
    app.kubernetes.io/version: "0.2"
  annotations:
    tekton.dev/displayName: "Download Model from HuggingFace"
spec:
  description: >-
    Download a model from HuggingFace Hub to a PVC. This task is idempotent -
    it will skip downloading if the model directory already exists on the PVC.
  params:
    - name: IMAGE
      type: string
      default: ghcr.io/albertoperdomo2/benchflow/benchflow:latest
    - name: RUN_PLAN
      type: string
    - name: MODELS_STORAGE_PVC
      type: string
      default: models-storage
  volumes:
    - name: models-storage
      persistentVolumeClaim:
        claimName: $(params.MODELS_STORAGE_PVC)
  steps:
    - name: download-model
      image: $(params.IMAGE)
      volumeMounts:
        - name: models-storage
          mountPath: /models-storage
      env:
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: huggingface-token
              key: HF_TOKEN
              optional: true
        - name: HOME
          value: /tmp/benchflow-home
        - name: HF_HOME
          value: /tmp/benchflow-hf/huggingface
        - name: XDG_CACHE_HOME
          value: /tmp/benchflow-hf/xdg-cache
        - name: HF_HUB_CACHE
          value: /tmp/benchflow-hf/huggingface/hub
        - name: HF_XET_CACHE
          value: /tmp/benchflow-hf/huggingface/xet
        - name: TRANSFORMERS_CACHE
          value: /tmp/benchflow-hf/huggingface/transformers
      command:
        - bflow
      args:
        - model
        - download
        - --run-plan-json
        - $(params.RUN_PLAN)
        - --models-storage-path
        - /models-storage
