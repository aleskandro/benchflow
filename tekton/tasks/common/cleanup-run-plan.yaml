apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: cleanup-run-plan
  labels:
    app.kubernetes.io/version: "0.1"
  annotations:
    tekton.dev/displayName: "Cleanup RunPlan"
spec:
  description: >-
    Remove the deployment resources described by the resolved RunPlan and
    optionally tear down the shared platform setup when explicitly requested.
  params:
    - name: IMAGE
      type: string
      default: ghcr.io/albertoperdomo2/benchflow:latest
    - name: RUN_PLAN
      type: string
    - name: TEARDOWN
      type: string
      default: "false"
  workspaces:
    - name: state-storage
      description: Workspace that may contain setup-state.json
      optional: true
    - name: target-kubeconfig
      description: Optional kubeconfig for remote target-cluster operations
      optional: true
  steps:
    - name: cleanup
      image: $(params.IMAGE)
      imagePullPolicy: Always
      env:
        - name: BENCHFLOW_TARGET_KUBECONFIG_WORKSPACE
          value: $(workspaces.target-kubeconfig.path)
      command:
        - bflow
      args:
        - task
        - cleanup-run-plan
        - --run-plan-json
        - $(params.RUN_PLAN)
        - --setup-state-path
        - $(workspaces.state-storage.path)/setup-state.json
        - --teardown-text
        - $(params.TEARDOWN)
