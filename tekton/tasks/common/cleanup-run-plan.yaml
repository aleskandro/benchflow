apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: cleanup-run-plan
  labels:
    app.kubernetes.io/version: "0.1"
  annotations:
    tekton.dev/displayName: "Cleanup RunPlan"
spec:
  description: >-
    Remove the deployment resources described by the resolved RunPlan and tear
    down any reversible platform setup recorded for the run.
  params:
    - name: IMAGE
      type: string
      default: ghcr.io/albertoperdomo2/benchflow/benchflow:latest
    - name: RUN_PLAN
      type: string
    - name: TEARDOWN
      type: string
      default: "true"
  workspaces:
    - name: state-storage
      description: Workspace that may contain setup-state.json
      optional: true
  steps:
    - name: cleanup
      image: $(params.IMAGE)
      command:
        - bflow
      args:
        - task
        - cleanup-run-plan
        - --run-plan-json
        - $(params.RUN_PLAN)
        - --setup-state-path
        - $(workspaces.state-storage.path)/setup-state.json
        - --teardown-text
        - $(params.TEARDOWN)
