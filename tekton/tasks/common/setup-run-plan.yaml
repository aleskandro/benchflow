apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: setup-run-plan
  labels:
    app.kubernetes.io/version: "0.1"
  annotations:
    tekton.dev/displayName: "Setup RunPlan"
spec:
  description: >-
    Setup platform-specific prerequisites for a resolved RunPlan and persist
    reversible state for final cleanup.
  params:
    - name: IMAGE
      type: string
      default: ghcr.io/albertoperdomo2/benchflow/benchflow:latest
    - name: RUN_PLAN
      type: string
    - name: SETUP_MODE
      type: string
      default: auto
  workspaces:
    - name: state-storage
      description: Workspace where setup-state.json will be written
    - name: target-kubeconfig
      description: Optional kubeconfig for remote target-cluster operations
      optional: true
  steps:
    - name: setup
      image: $(params.IMAGE)
      env:
        - name: BENCHFLOW_TARGET_KUBECONFIG_WORKSPACE
          value: $(workspaces.target-kubeconfig.path)
      command:
        - bflow
      args:
        - task
        - setup-run-plan
        - --run-plan-json
        - $(params.RUN_PLAN)
        - --setup-mode
        - $(params.SETUP_MODE)
        - --state-path
        - $(workspaces.state-storage.path)/setup-state.json
