apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: assert-task-status
spec:
  description: >-
    Fail explicitly when a previous task finished in Failed state. This is used
    to preserve PipelineRun failure semantics when a task runs with onError: continue
    so downstream artifact collection can still execute.
  params:
    - name: IMAGE
      type: string
      default: ghcr.io/albertoperdomo2/benchflow/benchflow:latest
    - name: TASK_NAME
      type: string
    - name: TASK_STATUS
      type: string
    - name: ALLOWED_STATUSES_TEXT
      type: string
      default: "Succeeded,None"
  steps:
    - name: assert
      image: $(params.IMAGE)
      command:
        - bflow
      args:
        - task
        - assert-status
        - --task-name
        - $(params.TASK_NAME)
        - --task-status
        - $(params.TASK_STATUS)
        - --allowed-statuses-text
        - $(params.ALLOWED_STATUSES_TEXT)
