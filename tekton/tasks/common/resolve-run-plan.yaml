apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: resolve-run-plan
spec:
  description: >-
    Validate the immutable RUN_PLAN payload and expose only the stage flags
    needed for pipeline gating. Unsupported benchmark tools fail fast here.
  params:
    - name: IMAGE
      type: string
      default: ghcr.io/albertoperdomo2/benchflow/benchflow:latest
    - name: RUN_PLAN
      type: string
  results:
    - name: stage-download
    - name: stage-deploy
    - name: stage-benchmark
    - name: stage-collect
    - name: stage-cleanup
    - name: verify-completions
  steps:
    - name: resolve
      image: $(params.IMAGE)
      command:
        - bflow
      args:
        - task
        - resolve-run-plan
        - --run-plan-json
        - $(params.RUN_PLAN)
        - --stage-download-path
        - $(results.stage-download.path)
        - --stage-deploy-path
        - $(results.stage-deploy.path)
        - --stage-benchmark-path
        - $(results.stage-benchmark.path)
        - --stage-collect-path
        - $(results.stage-collect.path)
        - --stage-cleanup-path
        - $(results.stage-cleanup.path)
        - --verify-completions-path
        - $(results.verify-completions.path)
