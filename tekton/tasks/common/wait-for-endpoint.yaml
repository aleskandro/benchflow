apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: wait-for-endpoint
  labels:
    app.kubernetes.io/version: "0.2"
  annotations:
    tekton.dev/displayName: "Wait for HTTP Endpoint"
spec:
  description: >-
    Wait for the endpoint resolved from the run plan to become available.
  params:
    - name: IMAGE
      type: string
      default: ghcr.io/albertoperdomo2/benchflow/benchflow:latest
    - name: RUN_PLAN
      type: string
  workspaces:
    - name: target-kubeconfig
      description: Optional kubeconfig for remote target-cluster operations
      optional: true
  steps:
    - name: wait-for-ready
      image: $(params.IMAGE)
      env:
        - name: BENCHFLOW_REMOTE_IMAGE
          value: $(params.IMAGE)
        - name: BENCHFLOW_TARGET_KUBECONFIG_WORKSPACE
          value: $(workspaces.target-kubeconfig.path)
      command:
        - bflow
      args:
        - wait
        - endpoint
        - --run-plan-json
        - $(params.RUN_PLAN)
