apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: run-guidellm-benchmark
  labels:
    app.kubernetes.io/version: "0.2"
  annotations:
    tekton.dev/displayName: "Run GuideLLM Benchmark"
spec:
  description: >-
    Execute the standard GuideLLM benchmark profile against an inference endpoint.
    MLflow is enabled by default in the BenchFlow e2e path.
  params:
    - name: IMAGE
      type: string
      default: ghcr.io/albertoperdomo2/benchflow/benchflow:latest
    - name: RUN_PLAN
      type: string
    - name: PIPELINE_RUN_NAME
      type: string
      default: ""
  workspaces:
    - name: results
      description: Workspace for benchmark outputs
      optional: true
    - name: target-kubeconfig
      description: Optional kubeconfig for remote target-cluster operations
      optional: true
  results:
    - name: mlflow-run-id
      description: MLflow run ID for metrics correlation
    - name: benchmark-start-time
      description: Benchmark start timestamp (ISO8601)
    - name: benchmark-end-time
      description: Benchmark end timestamp (ISO8601)
  steps:
    - name: run-guidellm-benchmark
      image: $(params.IMAGE)
      env:
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: huggingface-token
              key: HF_TOKEN
              optional: true
        - name: MLFLOW_TRACKING_USERNAME
          valueFrom:
            secretKeyRef:
              name: mlflow-ui-auth
              key: username
              optional: true
        - name: MLFLOW_TRACKING_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mlflow-ui-auth
              key: password
              optional: true
        - name: MLFLOW_TRACKING_URI
          valueFrom:
            secretKeyRef:
              name: mlflow-ui-auth
              key: tracking-uri
              optional: true
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: mlflow-s3-secret
              key: access-key
              optional: true
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: mlflow-s3-secret
              key: secret-key
              optional: true
        - name: MLFLOW_S3_BUCKET_NAME
          valueFrom:
            secretKeyRef:
              name: mlflow-s3-secret
              key: bucket-name
              optional: true
        - name: AWS_DEFAULT_REGION
          valueFrom:
            secretKeyRef:
              name: mlflow-s3-secret
              key: region
              optional: true
        - name: GUIDELLM__LOGGING__CONSOLE_LOG_LEVEL
          value: "INFO"
        - name: MLFLOW_TRACKING_INSECURE_TLS
          value: "true"
        - name: LOG_LEVEL
          value: "INFO"
        - name: HOME
          value: "/tmp/benchflow-guidellm/home"
        - name: DOCKER_CONFIG
          value: "/tmp/benchflow-guidellm/docker"
        - name: HF_HOME
          value: "/tmp/benchflow-guidellm/huggingface"
        - name: XDG_CACHE_HOME
          value: "/tmp/benchflow-guidellm/xdg-cache"
        - name: HF_HUB_CACHE
          value: "/tmp/benchflow-guidellm/huggingface/hub"
        - name: HF_XET_CACHE
          value: "/tmp/benchflow-guidellm/huggingface/xet"
        - name: TRANSFORMERS_CACHE
          value: "/tmp/benchflow-guidellm/huggingface/transformers"
        - name: BENCHFLOW_REMOTE_IMAGE
          value: $(params.IMAGE)
        - name: BENCHFLOW_TARGET_KUBECONFIG_WORKSPACE
          value: $(workspaces.target-kubeconfig.path)
      command:
        - bflow
      args:
        - benchmark
        - run
        - --run-plan-json
        - $(params.RUN_PLAN)
        - --output-dir
        - $(workspaces.results.path)
        - --execution-name
        - $(params.PIPELINE_RUN_NAME)
        - --mlflow-run-id-output
        - $(results.mlflow-run-id.path)
        - --benchmark-start-time-output
        - $(results.benchmark-start-time.path)
        - --benchmark-end-time-output
        - $(results.benchmark-end-time.path)
