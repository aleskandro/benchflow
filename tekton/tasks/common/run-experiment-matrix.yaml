apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: run-experiment-matrix
spec:
  description: >-
    Run a pre-resolved cartesian product of BenchFlow RunPlans sequentially by
    creating one child PipelineRun at a time and waiting for it to finish.
  params:
    - name: IMAGE
      type: string
      default: ghcr.io/albertoperdomo2/benchflow:latest
    - name: RUN_PLANS_CONFIGMAP
      type: string
    - name: CHILD_PIPELINE_NAME
      type: string
      default: benchflow-e2e
  workspaces:
    - name: target-kubeconfig
      description: Optional kubeconfig for remote target-cluster operations
      optional: true
  steps:
    - name: run
      image: $(params.IMAGE)
      env:
        - name: BENCHFLOW_IMAGE
          value: $(params.IMAGE)
        - name: BENCHFLOW_TARGET_KUBECONFIG_WORKSPACE
          value: $(workspaces.target-kubeconfig.path)
      command:
        - sh
      args:
        - -ceu
        - |
          run_plans_path="/tmp/run-plans.json"
          oc get configmap "$(params.RUN_PLANS_CONFIGMAP)" \
            -o jsonpath='{.data.run-plans\.json}' > "${run_plans_path}"

          exec bflow task run-experiment-matrix \
            --run-plans-file "${run_plans_path}" \
            --child-pipeline-name "$(params.CHILD_PIPELINE_NAME)"
