apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: upload-to-mlflow
  labels:
    app.kubernetes.io/version: "0.5"
  annotations:
    tekton.dev/displayName: "Upload to MLflow"
spec:
  description: >-
    Upload the full per-run BenchFlow bundle to MLflow, set the Grafana tag,
    and clean the local run directory afterward.
  params:
    - name: IMAGE
      type: string
      default: ghcr.io/albertoperdomo2/benchflow/benchflow:latest
    - name: RUN_PLAN
      type: string
    - name: MLFLOW_RUN_ID
      type: string
    - name: BENCHMARK_START_TIME
      type: string
    - name: BENCHMARK_END_TIME
      type: string
    - name: GRAFANA_URL
      type: string
      default: ""
  workspaces:
    - name: artifacts
      description: Workspace containing the full per-run BenchFlow bundle
  steps:
    - name: upload
      image: $(params.IMAGE)
      env:
        - name: MLFLOW_TRACKING_URI
          valueFrom:
            secretKeyRef:
              name: mlflow-ui-auth
              key: tracking-uri
              optional: true
        - name: MLFLOW_TRACKING_USERNAME
          valueFrom:
            secretKeyRef:
              name: mlflow-ui-auth
              key: username
              optional: true
        - name: MLFLOW_TRACKING_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mlflow-ui-auth
              key: password
              optional: true
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: mlflow-s3-secret
              key: access-key
              optional: true
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: mlflow-s3-secret
              key: secret-key
              optional: true
        - name: AWS_DEFAULT_REGION
          valueFrom:
            secretKeyRef:
              name: mlflow-s3-secret
              key: region
              optional: true
        - name: MLFLOW_TRACKING_INSECURE_TLS
          value: "true"
      command:
        - bflow
      args:
        - mlflow
        - upload
        - --run-plan-json
        - $(params.RUN_PLAN)
        - --mlflow-run-id
        - $(params.MLFLOW_RUN_ID)
        - --benchmark-start-time
        - $(params.BENCHMARK_START_TIME)
        - --benchmark-end-time
        - $(params.BENCHMARK_END_TIME)
        - --artifacts-dir
        - $(workspaces.artifacts.path)
        - --grafana-url
        - $(params.GRAFANA_URL)
