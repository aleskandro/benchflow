apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: collect-metrics
  labels:
    app.kubernetes.io/name: benchflow
spec:
  description: >-
    Query Prometheus or Thanos for the metrics configured in the resolved run
    plan and persist raw responses plus a compact summary into the artifacts
    workspace for MLflow upload.
  params:
    - name: IMAGE
      type: string
      default: ghcr.io/albertoperdomo2/benchflow/benchflow:latest
    - name: RUN_PLAN
      type: string
    - name: BENCHMARK_START_TIME
      type: string
    - name: BENCHMARK_END_TIME
      type: string
  workspaces:
    - name: artifacts
      description: Workspace to store metrics artifacts
  steps:
    - name: collect
      image: $(params.IMAGE)
      command:
        - bflow
      args:
        - metrics
        - collect
        - --run-plan-json
        - $(params.RUN_PLAN)
        - --benchmark-start-time
        - $(params.BENCHMARK_START_TIME)
        - --benchmark-end-time
        - $(params.BENCHMARK_END_TIME)
        - --artifacts-dir
        - $(workspaces.artifacts.path)
