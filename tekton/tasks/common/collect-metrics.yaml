apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: collect-metrics
  labels:
    app.kubernetes.io/name: benchflow
spec:
  description: >-
    Query Prometheus or Thanos for the metrics configured in the resolved run
    plan and persist raw responses plus a compact summary into the artifacts
    workspace for MLflow upload.
  params:
    - name: IMAGE
      type: string
      default: ghcr.io/albertoperdomo2/benchflow/benchflow:latest
    - name: RUN_PLAN
      type: string
    - name: BENCHMARK_START_TIME
      type: string
    - name: BENCHMARK_END_TIME
      type: string
    - name: MLFLOW_RUN_ID
      type: string
      default: ""
  workspaces:
    - name: artifacts
      description: Workspace to store metrics artifacts
    - name: target-kubeconfig
      description: Optional kubeconfig for remote target-cluster operations
      optional: true
  steps:
    - name: collect
      image: $(params.IMAGE)
      env:
        - name: BENCHFLOW_REMOTE_IMAGE
          value: $(params.IMAGE)
        - name: BENCHFLOW_TARGET_KUBECONFIG_WORKSPACE
          value: $(workspaces.target-kubeconfig.path)
        - name: MLFLOW_TRACKING_URI
          valueFrom:
            secretKeyRef:
              name: mlflow-ui-auth
              key: tracking-uri
              optional: true
        - name: MLFLOW_TRACKING_USERNAME
          valueFrom:
            secretKeyRef:
              name: mlflow-ui-auth
              key: username
              optional: true
        - name: MLFLOW_TRACKING_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mlflow-ui-auth
              key: password
              optional: true
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: mlflow-s3-secret
              key: access-key
              optional: true
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: mlflow-s3-secret
              key: secret-key
              optional: true
        - name: AWS_DEFAULT_REGION
          valueFrom:
            secretKeyRef:
              name: mlflow-s3-secret
              key: region
              optional: true
        - name: MLFLOW_TRACKING_INSECURE_TLS
          value: "true"
      command:
        - bflow
      args:
        - metrics
        - collect
        - --run-plan-json
        - $(params.RUN_PLAN)
        - --benchmark-start-time
        - $(params.BENCHMARK_START_TIME)
        - --benchmark-end-time
        - $(params.BENCHMARK_END_TIME)
        - --artifacts-dir
        - $(workspaces.artifacts.path)
        - --mlflow-run-id
        - $(params.MLFLOW_RUN_ID)
