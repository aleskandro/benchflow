apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: benchflow-run-guidellm-benchmark
  labels:
    app.kubernetes.io/name: benchflow
spec:
  templates:
    - name: run-guidellm-benchmark
      inputs:
        parameters:
          - name: BENCHFLOW_IMAGE
          - name: RUN_PLAN
          - name: EXECUTION_NAME
      script:
        image: "{{inputs.parameters.BENCHFLOW_IMAGE}}"
        command:
          - bash
        env:
          - name: HF_TOKEN
            valueFrom:
              secretKeyRef:
                name: huggingface-token
                key: HF_TOKEN
                optional: true
          - name: MLFLOW_TRACKING_USERNAME
            valueFrom:
              secretKeyRef:
                name: mlflow-ui-auth
                key: username
                optional: true
          - name: MLFLOW_TRACKING_PASSWORD
            valueFrom:
              secretKeyRef:
                name: mlflow-ui-auth
                key: password
                optional: true
          - name: MLFLOW_TRACKING_URI
            valueFrom:
              secretKeyRef:
                name: mlflow-ui-auth
                key: tracking-uri
                optional: true
          - name: AWS_ACCESS_KEY_ID
            valueFrom:
              secretKeyRef:
                name: mlflow-s3-secret
                key: access-key
                optional: true
          - name: AWS_SECRET_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: mlflow-s3-secret
                key: secret-key
                optional: true
          - name: MLFLOW_S3_BUCKET_NAME
            valueFrom:
              secretKeyRef:
                name: mlflow-s3-secret
                key: bucket-name
                optional: true
          - name: AWS_DEFAULT_REGION
            valueFrom:
              secretKeyRef:
                name: mlflow-s3-secret
                key: region
                optional: true
          - name: GUIDELLM__LOGGING__CONSOLE_LOG_LEVEL
            value: "INFO"
          - name: MLFLOW_TRACKING_INSECURE_TLS
            value: "true"
          - name: LOG_LEVEL
            value: "INFO"
          - name: HOME
            value: /tmp/benchflow-guidellm/home
          - name: DOCKER_CONFIG
            value: /tmp/benchflow-guidellm/docker
          - name: HF_HOME
            value: /tmp/benchflow-guidellm/huggingface
          - name: XDG_CACHE_HOME
            value: /tmp/benchflow-guidellm/xdg-cache
          - name: HF_HUB_CACHE
            value: /tmp/benchflow-guidellm/huggingface/hub
          - name: HF_XET_CACHE
            value: /tmp/benchflow-guidellm/huggingface/xet
          - name: TRANSFORMERS_CACHE
            value: /tmp/benchflow-guidellm/huggingface/transformers
        source: |
          set +e
          workflow_state_dir="/workspace/results/{{inputs.parameters.EXECUTION_NAME}}/workflow-state"
          mkdir -p "$workflow_state_dir"
          : > "$workflow_state_dir/mlflow-run-id.txt"
          : > "$workflow_state_dir/benchmark-start-time.txt"
          : > "$workflow_state_dir/benchmark-end-time.txt"
          bflow benchmark run \
            --run-plan-json '{{inputs.parameters.RUN_PLAN}}' \
            --output-dir '/workspace/results/{{inputs.parameters.EXECUTION_NAME}}/benchmark' \
            --execution-name '{{inputs.parameters.EXECUTION_NAME}}' \
            --mlflow-run-id-output "$workflow_state_dir/mlflow-run-id.txt" \
            --benchmark-start-time-output "$workflow_state_dir/benchmark-start-time.txt" \
            --benchmark-end-time-output "$workflow_state_dir/benchmark-end-time.txt"
          rc=$?
          if [ "$rc" -eq 0 ]; then
            echo Succeeded > "$workflow_state_dir/benchmark-status.txt"
          else
            echo Failed > "$workflow_state_dir/benchmark-status.txt"
          fi
          exit 0
        volumeMounts:
          - name: results
            mountPath: /workspace/results
      outputs:
        parameters:
          - name: mlflow-run-id
            valueFrom:
              path: "/workspace/results/{{inputs.parameters.EXECUTION_NAME}}/workflow-state/mlflow-run-id.txt"
          - name: benchmark-start-time
            valueFrom:
              path: "/workspace/results/{{inputs.parameters.EXECUTION_NAME}}/workflow-state/benchmark-start-time.txt"
          - name: benchmark-end-time
            valueFrom:
              path: "/workspace/results/{{inputs.parameters.EXECUTION_NAME}}/workflow-state/benchmark-end-time.txt"
