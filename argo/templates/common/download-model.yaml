apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: benchflow-download-model
  labels:
    app.kubernetes.io/name: benchflow
spec:
  templates:
    - name: download-model
      inputs:
        parameters:
          - name: BENCHFLOW_IMAGE
          - name: RUN_PLAN
      container:
        image: "{{inputs.parameters.BENCHFLOW_IMAGE}}"
        command:
          - bflow
        args:
          - model
          - download
          - --run-plan-json
          - "{{inputs.parameters.RUN_PLAN}}"
          - --models-storage-path
          - /models-storage
        env:
          - name: HF_TOKEN
            valueFrom:
              secretKeyRef:
                name: huggingface-token
                key: HF_TOKEN
                optional: true
          - name: HOME
            value: /tmp/benchflow-home
          - name: HF_HOME
            value: /tmp/benchflow-hf/huggingface
          - name: XDG_CACHE_HOME
            value: /tmp/benchflow-hf/xdg-cache
          - name: HF_HUB_CACHE
            value: /tmp/benchflow-hf/huggingface/hub
          - name: HF_XET_CACHE
            value: /tmp/benchflow-hf/huggingface/xet
          - name: TRANSFORMERS_CACHE
            value: /tmp/benchflow-hf/huggingface/transformers
        volumeMounts:
          - name: models-storage
            mountPath: /models-storage
