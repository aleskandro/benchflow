apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: benchflow-deploy-run-plan
  labels:
    app.kubernetes.io/name: benchflow
spec:
  templates:
    - name: deploy-run-plan
      inputs:
        parameters:
          - name: BENCHFLOW_IMAGE
          - name: RUN_PLAN
          - name: EXECUTION_NAME
      container:
        image: "{{inputs.parameters.BENCHFLOW_IMAGE}}"
        command:
          - bflow
        args:
          - task
          - deploy-run-plan
          - --run-plan-json
          - "{{inputs.parameters.RUN_PLAN}}"
          - --workspace-dir
          - /workspace/source
          - --manifests-dir
          - "/workspace/results/{{inputs.parameters.EXECUTION_NAME}}/rendered-manifests"
          - --pipeline-run-name
          - "{{inputs.parameters.EXECUTION_NAME}}"
        volumeMounts:
          - name: source
            mountPath: /workspace/source
          - name: results
            mountPath: /workspace/results
