apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: benchflow-upload-to-mlflow
  labels:
    app.kubernetes.io/name: benchflow
spec:
  templates:
    - name: upload-to-mlflow
      inputs:
        parameters:
          - name: BENCHFLOW_IMAGE
          - name: RUN_PLAN
          - name: MLFLOW_RUN_ID
          - name: BENCHMARK_START_TIME
          - name: BENCHMARK_END_TIME
          - name: EXECUTION_NAME
      container:
        image: "{{inputs.parameters.BENCHFLOW_IMAGE}}"
        command:
          - bflow
        args:
          - mlflow
          - upload
          - --run-plan-json
          - "{{inputs.parameters.RUN_PLAN}}"
          - --mlflow-run-id
          - "{{inputs.parameters.MLFLOW_RUN_ID}}"
          - --benchmark-start-time
          - "{{inputs.parameters.BENCHMARK_START_TIME}}"
          - --benchmark-end-time
          - "{{inputs.parameters.BENCHMARK_END_TIME}}"
          - --artifacts-dir
          - "/workspace/results/{{inputs.parameters.EXECUTION_NAME}}"
          - --grafana-url
          - ""
        env:
          - name: MLFLOW_TRACKING_URI
            valueFrom:
              secretKeyRef:
                name: mlflow-ui-auth
                key: tracking-uri
                optional: true
          - name: MLFLOW_TRACKING_USERNAME
            valueFrom:
              secretKeyRef:
                name: mlflow-ui-auth
                key: username
                optional: true
          - name: MLFLOW_TRACKING_PASSWORD
            valueFrom:
              secretKeyRef:
                name: mlflow-ui-auth
                key: password
                optional: true
          - name: AWS_ACCESS_KEY_ID
            valueFrom:
              secretKeyRef:
                name: mlflow-s3-secret
                key: access-key
                optional: true
          - name: AWS_SECRET_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: mlflow-s3-secret
                key: secret-key
                optional: true
          - name: AWS_DEFAULT_REGION
            valueFrom:
              secretKeyRef:
                name: mlflow-s3-secret
                key: region
                optional: true
          - name: MLFLOW_TRACKING_INSECURE_TLS
            value: "true"
        volumeMounts:
          - name: results
            mountPath: /workspace/results
