apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: benchflow-collect-artifacts
  labels:
    app.kubernetes.io/name: benchflow
spec:
  templates:
    - name: collect-artifacts
      inputs:
        parameters:
          - name: BENCHFLOW_IMAGE
          - name: RUN_PLAN
          - name: EXECUTION_NAME
      script:
        image: "{{inputs.parameters.BENCHFLOW_IMAGE}}"
        command:
          - bash
        source: |
          set +e
          bflow artifacts collect \
            --run-plan-json '{{inputs.parameters.RUN_PLAN}}' \
            --artifacts-dir '/workspace/results/{{inputs.parameters.EXECUTION_NAME}}' \
            --pipeline-run-name '{{inputs.parameters.EXECUTION_NAME}}'
          exit 0
        volumeMounts:
          - name: results
            mountPath: /workspace/results
