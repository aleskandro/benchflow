apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: benchflow-setup-run-plan
  labels:
    app.kubernetes.io/name: benchflow
spec:
  templates:
    - name: setup-run-plan
      inputs:
        parameters:
          - name: BENCHFLOW_IMAGE
          - name: RUN_PLAN
          - name: SETUP_MODE
          - name: EXECUTION_NAME
      container:
        image: "{{inputs.parameters.BENCHFLOW_IMAGE}}"
        command:
          - bflow
        args:
          - task
          - setup-run-plan
          - --run-plan-json
          - "{{inputs.parameters.RUN_PLAN}}"
          - --setup-mode
          - "{{inputs.parameters.SETUP_MODE}}"
          - --state-path
          - "/workspace/results/{{inputs.parameters.EXECUTION_NAME}}/platform-state/setup-state.json"
        volumeMounts:
          - name: results
            mountPath: /workspace/results
