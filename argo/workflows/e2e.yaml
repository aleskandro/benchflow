apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: benchflow-e2e
  labels:
    app.kubernetes.io/name: benchflow
spec:
  entrypoint: pipeline
  onExit: finalize
  templates:
    - name: pipeline
      steps:
        - - name: resolve-run-plan
            templateRef:
              name: benchflow-resolve-run-plan
              template: resolve-run-plan
            arguments:
              parameters:
                - name: BENCHFLOW_IMAGE
                  value: "{{workflow.parameters.BENCHFLOW_IMAGE}}"
                - name: RUN_PLAN
                  value: "{{workflow.parameters.RUN_PLAN}}"
                - name: EXECUTION_NAME
                  value: "{{workflow.name}}"
        - - name: setup-run-plan
            templateRef:
              name: benchflow-setup-run-plan
              template: setup-run-plan
            when: "{{steps.resolve-run-plan.outputs.parameters.stage-deploy}} == true"
            arguments:
              parameters:
                - name: BENCHFLOW_IMAGE
                  value: "{{workflow.parameters.BENCHFLOW_IMAGE}}"
                - name: RUN_PLAN
                  value: "{{workflow.parameters.RUN_PLAN}}"
                - name: SETUP_MODE
                  value: "{{workflow.parameters.SETUP_MODE}}"
                - name: EXECUTION_NAME
                  value: "{{workflow.name}}"
        - - name: download-model
            templateRef:
              name: benchflow-download-model
              template: download-model
            when: "{{steps.resolve-run-plan.outputs.parameters.stage-download}} == true"
            arguments:
              parameters:
                - name: BENCHFLOW_IMAGE
                  value: "{{workflow.parameters.BENCHFLOW_IMAGE}}"
                - name: RUN_PLAN
                  value: "{{workflow.parameters.RUN_PLAN}}"
        - - name: deploy
            templateRef:
              name: benchflow-deploy-run-plan
              template: deploy-run-plan
            when: "{{steps.resolve-run-plan.outputs.parameters.stage-deploy}} == true"
            arguments:
              parameters:
                - name: BENCHFLOW_IMAGE
                  value: "{{workflow.parameters.BENCHFLOW_IMAGE}}"
                - name: RUN_PLAN
                  value: "{{workflow.parameters.RUN_PLAN}}"
                - name: EXECUTION_NAME
                  value: "{{workflow.name}}"
        - - name: wait-for-endpoint
            templateRef:
              name: benchflow-wait-for-endpoint
              template: wait-for-endpoint
            when: "{{steps.resolve-run-plan.outputs.parameters.stage-benchmark}} == true"
            arguments:
              parameters:
                - name: BENCHFLOW_IMAGE
                  value: "{{workflow.parameters.BENCHFLOW_IMAGE}}"
                - name: RUN_PLAN
                  value: "{{workflow.parameters.RUN_PLAN}}"
        - - name: benchmark
            templateRef:
              name: benchflow-run-guidellm-benchmark
              template: run-guidellm-benchmark
            when: "{{steps.resolve-run-plan.outputs.parameters.stage-benchmark}} == true"
            arguments:
              parameters:
                - name: BENCHFLOW_IMAGE
                  value: "{{workflow.parameters.BENCHFLOW_IMAGE}}"
                - name: RUN_PLAN
                  value: "{{workflow.parameters.RUN_PLAN}}"
                - name: EXECUTION_NAME
                  value: "{{workflow.name}}"
        - - name: collect-artifacts
            templateRef:
              name: benchflow-collect-artifacts
              template: collect-artifacts
            when: "{{steps.resolve-run-plan.outputs.parameters.stage-collect}} == true"
            arguments:
              parameters:
                - name: BENCHFLOW_IMAGE
                  value: "{{workflow.parameters.BENCHFLOW_IMAGE}}"
                - name: RUN_PLAN
                  value: "{{workflow.parameters.RUN_PLAN}}"
                - name: EXECUTION_NAME
                  value: "{{workflow.name}}"
        - - name: collect-metrics
            templateRef:
              name: benchflow-collect-metrics
              template: collect-metrics
            when: "{{steps.resolve-run-plan.outputs.parameters.stage-collect}} == true && {{steps.resolve-run-plan.outputs.parameters.stage-benchmark}} == true"
            arguments:
              parameters:
                - name: BENCHFLOW_IMAGE
                  value: "{{workflow.parameters.BENCHFLOW_IMAGE}}"
                - name: RUN_PLAN
                  value: "{{workflow.parameters.RUN_PLAN}}"
                - name: BENCHMARK_START_TIME
                  value: "{{steps.benchmark.outputs.parameters.benchmark-start-time}}"
                - name: BENCHMARK_END_TIME
                  value: "{{steps.benchmark.outputs.parameters.benchmark-end-time}}"
                - name: EXECUTION_NAME
                  value: "{{workflow.name}}"
        - - name: upload-to-mlflow
            templateRef:
              name: benchflow-upload-to-mlflow
              template: upload-to-mlflow
            when: "{{steps.resolve-run-plan.outputs.parameters.stage-collect}} == true && {{steps.resolve-run-plan.outputs.parameters.stage-benchmark}} == true"
            arguments:
              parameters:
                - name: BENCHFLOW_IMAGE
                  value: "{{workflow.parameters.BENCHFLOW_IMAGE}}"
                - name: RUN_PLAN
                  value: "{{workflow.parameters.RUN_PLAN}}"
                - name: MLFLOW_RUN_ID
                  value: "{{steps.benchmark.outputs.parameters.mlflow-run-id}}"
                - name: BENCHMARK_START_TIME
                  value: "{{steps.benchmark.outputs.parameters.benchmark-start-time}}"
                - name: BENCHMARK_END_TIME
                  value: "{{steps.benchmark.outputs.parameters.benchmark-end-time}}"
                - name: EXECUTION_NAME
                  value: "{{workflow.name}}"

    - name: finalize
      script:
        image: "{{workflow.parameters.BENCHFLOW_IMAGE}}"
        command:
          - bash
        source: |
          set +e
          status=0
          workflow_state_dir="/workspace/results/{{workflow.name}}/workflow-state"

          run_or_record() {
            "$@"
            rc=$?
            if [ "$rc" -ne 0 ] && [ "$status" -eq 0 ]; then
              status=$rc
            fi
            return 0
          }

          stage_cleanup="$(cat "$workflow_state_dir/stage-cleanup.txt" 2>/dev/null || echo false)"
          stage_benchmark="$(cat "$workflow_state_dir/stage-benchmark.txt" 2>/dev/null || echo false)"
          stage_collect="$(cat "$workflow_state_dir/stage-collect.txt" 2>/dev/null || echo false)"
          benchmark_status="$(cat "$workflow_state_dir/benchmark-status.txt" 2>/dev/null || echo None)"
          metrics_status="$(cat "$workflow_state_dir/metrics-status.txt" 2>/dev/null || echo None)"

          if [ "$stage_cleanup" = "true" ]; then
            run_or_record bflow task cleanup-run-plan \
              --run-plan-json '{{workflow.parameters.RUN_PLAN}}' \
              --setup-state-path '/workspace/results/{{workflow.name}}/platform-state/setup-state.json' \
              --teardown-text '{{workflow.parameters.TEARDOWN}}'
          fi

          if [ "$stage_benchmark" = "true" ]; then
            run_or_record bflow task assert-status \
              --task-name benchmark \
              --task-status "$benchmark_status" \
              --allowed-statuses-text Succeeded,None
          fi

          if [ "$stage_collect" = "true" ] && [ "$stage_benchmark" = "true" ]; then
            run_or_record bflow task assert-status \
              --task-name collect-metrics \
              --task-status "$metrics_status" \
              --allowed-statuses-text Succeeded,None
          fi

          rm -rf "$workflow_state_dir"
          rmdir "/workspace/results/{{workflow.name}}" 2>/dev/null || true

          exit "$status"
        volumeMounts:
          - name: results
            mountPath: /workspace/results
