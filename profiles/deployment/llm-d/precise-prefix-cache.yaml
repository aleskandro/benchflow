apiVersion: benchflow.io/v1alpha1
kind: DeploymentProfile
metadata:
  name: llm-d-precise-prefix-cache
spec:
  platform: llm-d
  mode: precise-prefix-cache
  repo_url: https://github.com/llm-d/llm-d.git
  repo_ref: v0.4.0
  gateway: istio
  endpoint_path: /v1/models
  model_storage:
    pvc_name: models-storage
    cache_dir: /models
    mount_path: /model-cache
  runtime:
    image: ghcr.io/llm-d/llm-d-cuda-dev:sha-3222272
    replicas: 4
    tensor_parallelism: 2
    vllm_args:
      - --max-model-len=8192
      - --gpu-memory-utilization=0.92
      - --trust-remote-code
      - --disable-log-requests
      - --enable-prefix-caching
