apiVersion: benchflow.io/v1alpha1
kind: MetricsProfile
metadata:
  name: detailed
spec:
  prometheus_url: https://thanos-querier.openshift-monitoring.svc:9091
  query_step: 15s
  query_timeout: 30s
  verify_tls: false
  queries:
    active_pods: count(kube_pod_info{namespace="$namespace", pod=~".*$release.*"})
    avg_gpu_utilization: avg(DCGM_FI_DEV_GPU_UTIL{exported_namespace="$namespace", exported_pod=~".*$release.*"})
    avg_cpu_usage_percent: avg(rate(container_cpu_usage_seconds_total{namespace="$namespace", pod=~".*$release.*"}[5m])) * 100
    avg_memory_working_set_bytes: avg(container_memory_working_set_bytes{namespace="$namespace", pod=~".*$release.*"})
    prompt_tokens_total: '{__name__=~"(vllm|kserve_vllm):prompt_tokens_total", namespace="$namespace", pod=~".*$release.*"}'
    generation_tokens_total: '{__name__=~"(vllm|kserve_vllm):generation_tokens_total", namespace="$namespace", pod=~".*$release.*"}'
    prompt_token_rate_per_second: rate({__name__=~"(vllm|kserve_vllm):prompt_tokens_total", namespace="$namespace", pod=~".*$release.*"}[5m])
    generation_token_rate_per_second: rate({__name__=~"(vllm|kserve_vllm):generation_tokens_total", namespace="$namespace", pod=~".*$release.*"}[5m])
    generation_token_rate_sum_per_second: sum(rate({__name__=~"(vllm|kserve_vllm):generation_tokens_total", namespace="$namespace", pod=~".*$release.*"}[5m]))
    request_success_rate_by_pod: sum by (pod) (rate({__name__=~"(vllm|kserve_vllm):request_success_total", namespace="$namespace", pod=~".*$release.*"}[5m]))
    num_requests_running: '{__name__=~"(vllm|kserve_vllm):num_requests_running", namespace="$namespace", pod=~".*$release.*"}'
    num_requests_waiting: '{__name__=~"(vllm|kserve_vllm):num_requests_waiting", namespace="$namespace", pod=~".*$release.*"}'
    e2e_request_latency_p50_seconds: histogram_quantile(0.5, sum(rate({__name__=~"(vllm|kserve_vllm):e2e_request_latency_seconds_bucket", namespace="$namespace", pod=~".*$release.*"}[5m])) by (le))
    e2e_request_latency_p90_seconds: histogram_quantile(0.9, sum(rate({__name__=~"(vllm|kserve_vllm):e2e_request_latency_seconds_bucket", namespace="$namespace", pod=~".*$release.*"}[5m])) by (le))
    e2e_request_latency_p99_seconds: histogram_quantile(0.99, sum(rate({__name__=~"(vllm|kserve_vllm):e2e_request_latency_seconds_bucket", namespace="$namespace", pod=~".*$release.*"}[5m])) by (le))
    ttft_p50_seconds: histogram_quantile(0.5, sum(rate({__name__=~"(vllm|kserve_vllm):time_to_first_token_seconds_bucket", namespace="$namespace", pod=~".*$release.*"}[5m])) by (le))
    ttft_p90_seconds: histogram_quantile(0.9, sum(rate({__name__=~"(vllm|kserve_vllm):time_to_first_token_seconds_bucket", namespace="$namespace", pod=~".*$release.*"}[5m])) by (le))
    ttft_p99_seconds: histogram_quantile(0.99, sum(rate({__name__=~"(vllm|kserve_vllm):time_to_first_token_seconds_bucket", namespace="$namespace", pod=~".*$release.*"}[5m])) by (le))
    tpot_p50_seconds: histogram_quantile(0.5, sum(rate({__name__=~"(vllm|kserve_vllm):request_time_per_output_token_seconds_bucket", namespace="$namespace", pod=~".*$release.*"}[5m])) by (le))
    tpot_p90_seconds: histogram_quantile(0.9, sum(rate({__name__=~"(vllm|kserve_vllm):request_time_per_output_token_seconds_bucket", namespace="$namespace", pod=~".*$release.*"}[5m])) by (le))
    tpot_p99_seconds: histogram_quantile(0.99, sum(rate({__name__=~"(vllm|kserve_vllm):request_time_per_output_token_seconds_bucket", namespace="$namespace", pod=~".*$release.*"}[5m])) by (le))
    prefill_time_p50_seconds: histogram_quantile(0.5, sum(rate({__name__=~"(vllm|kserve_vllm):request_prefill_time_seconds_bucket", namespace="$namespace", pod=~".*$release.*"}[5m])) by (le))
    prefill_time_p90_seconds: histogram_quantile(0.9, sum(rate({__name__=~"(vllm|kserve_vllm):request_prefill_time_seconds_bucket", namespace="$namespace", pod=~".*$release.*"}[5m])) by (le))
    prefill_time_p99_seconds: histogram_quantile(0.99, sum(rate({__name__=~"(vllm|kserve_vllm):request_prefill_time_seconds_bucket", namespace="$namespace", pod=~".*$release.*"}[5m])) by (le))
    decode_time_p50_seconds: histogram_quantile(0.5, sum(rate({__name__=~"(vllm|kserve_vllm):request_decode_time_seconds_bucket", namespace="$namespace", pod=~".*$release.*"}[5m])) by (le))
    decode_time_p90_seconds: histogram_quantile(0.9, sum(rate({__name__=~"(vllm|kserve_vllm):request_decode_time_seconds_bucket", namespace="$namespace", pod=~".*$release.*"}[5m])) by (le))
    decode_time_p99_seconds: histogram_quantile(0.99, sum(rate({__name__=~"(vllm|kserve_vllm):request_decode_time_seconds_bucket", namespace="$namespace", pod=~".*$release.*"}[5m])) by (le))
    queue_time_p50_seconds: histogram_quantile(0.5, sum(rate({__name__=~"(vllm|kserve_vllm):request_queue_time_seconds_bucket", namespace="$namespace", pod=~".*$release.*"}[5m])) by (le))
    queue_time_p90_seconds: histogram_quantile(0.9, sum(rate({__name__=~"(vllm|kserve_vllm):request_queue_time_seconds_bucket", namespace="$namespace", pod=~".*$release.*"}[5m])) by (le))
    queue_time_p99_seconds: histogram_quantile(0.99, sum(rate({__name__=~"(vllm|kserve_vllm):request_queue_time_seconds_bucket", namespace="$namespace", pod=~".*$release.*"}[5m])) by (le))
    inference_time_p50_seconds: histogram_quantile(0.5, sum(rate({__name__=~"(vllm|kserve_vllm):request_inference_time_seconds_bucket", namespace="$namespace", pod=~".*$release.*"}[5m])) by (le))
    inference_time_p90_seconds: histogram_quantile(0.9, sum(rate({__name__=~"(vllm|kserve_vllm):request_inference_time_seconds_bucket", namespace="$namespace", pod=~".*$release.*"}[5m])) by (le))
    inference_time_p99_seconds: histogram_quantile(0.99, sum(rate({__name__=~"(vllm|kserve_vllm):request_inference_time_seconds_bucket", namespace="$namespace", pod=~".*$release.*"}[5m])) by (le))
    kv_cache_usage_percent: '{__name__=~"(vllm|kserve_vllm):kv_cache_usage_perc", namespace="$namespace", pod=~".*$release.*"}'
    prefix_cache_hit_rate: rate({__name__=~"(vllm|kserve_vllm):prefix_cache_hits_total", namespace="$namespace", pod=~".*$release.*"}[5m]) / clamp_min(rate({__name__=~"(vllm|kserve_vllm):prefix_cache_queries_total", namespace="$namespace", pod=~".*$release.*"}[5m]), 1)
    num_preemptions_rate: rate({__name__=~"(vllm|kserve_vllm):num_preemptions_total", namespace="$namespace", pod=~".*$release.*"}[5m])
    gpu_utilization_by_pod: DCGM_FI_DEV_GPU_UTIL{exported_namespace="$namespace", exported_pod=~".*$release.*"}
    gpu_memory_used_by_pod: DCGM_FI_DEV_FB_USED{exported_namespace="$namespace", exported_pod=~".*$release.*"}
    gpu_memory_free_by_pod: DCGM_FI_DEV_FB_FREE{exported_namespace="$namespace", exported_pod=~".*$release.*"}
    cpu_usage_percent_by_pod: rate(container_cpu_usage_seconds_total{namespace="$namespace", pod=~".*$release.*"}[5m]) * 100
    memory_working_set_bytes_by_pod: container_memory_working_set_bytes{namespace="$namespace", pod=~".*$release.*"}
    network_receive_bytes_per_second: rate(container_network_receive_bytes_total{namespace="$namespace", pod=~".*$release.*"}[5m])
    network_transmit_bytes_per_second: rate(container_network_transmit_bytes_total{namespace="$namespace", pod=~".*$release.*"}[5m])
